name: Yearly Calendar Regen

on:
  schedule:
    # 1 de janeiro 00:01 BRT = 03:01 UTC
    - cron: '1 3 1 1 *'
  workflow_dispatch: {}

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pillow
      - name: Regenerate site
        env:
          PYTHONUTF8: '1'
        run: python tools/generate_site.py
      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "auto: regen yearly $(date +%Y)" && git push)
